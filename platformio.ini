; PlatformIO Project Configuration File
;
; CDI//MGPRO - Programmable CDI for Honda Megapro / GL series
; Target: ESP32 DOIT DevKit V1

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = default.csv
; UI source files lives di web/, NOT data/. LittleFS partition tetap
; dipakai oleh edge_snapshot module untuk runtime save scope ring
; snapshots — tapi UI files sudah pindah ke PROGMEM (embedded di
; firmware via scripts/build_ui.py). Folder data/ sengaja dihapus
; supaya tidak ada source-of-truth confusion.
;
; `pio run -t uploadfs` masih bisa dipakai untuk re-init LittleFS
; partition kosong kalau corrupt (snapshots akan recreate runtime).

; Pre-build hook: gzip + embed semua file di web/ ke include/ui_pages.h
; sebagai PROGMEM arrays. http_server serve dari sini dengan
; Content-Encoding: gzip. OTA firmware update otomatis update UI.
extra_scripts = pre:scripts/build_ui.py

lib_deps =
    ESP32Async/ESPAsyncWebServer@^3.6.0
    ESP32Async/AsyncTCP@^3.3.2
    bblanchon/ArduinoJson@^7.2.0

; ─── WiFi AP credentials ──────────────────────────────────────────
; SSID + password are compile-time constants. Edit, rebuild,
; reflash. Both are committed to this file — keep the repo private
; if the password matters to you.
; WPA2-PSK rules: password must be 8-63 printable ASCII chars.
build_flags =
    -D CORE_DEBUG_LEVEL=1
    -D CDI_AP_SSID='"CDI-Megapro"'
    -D CDI_AP_PASSWORD='"ganti-password"'
