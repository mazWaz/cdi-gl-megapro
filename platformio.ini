; PlatformIO Project Configuration File
;
; CDI//MGPRO — Programmable CDI for Honda Megapro / GL series
; Target: ESP32 DOIT DevKit V1

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = default.csv


lib_deps =
    ESP32Async/ESPAsyncWebServer@^3.6.0
    ESP32Async/AsyncTCP@^3.3.2
    bblanchon/ArduinoJson@^7.2.0

build_flags =
    -D CORE_DEBUG_LEVEL=1
    ; ── WiFi SoftAP SSID (configurable per build) ──
    ; This is the broadcast network name, NOT a secret — see it on every
    ; phone scanning for WiFi. Change to distinguish multiple bikes/builds.
    ; Password is generated randomly per device at first boot and
    ; persisted in NVS (see src/net/wifi_ap.cpp) — never committed here.
    -D CDI_AP_SSID='"CDI-Megapro"'
